<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pi Monitor - Raspberry Pi Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: #0f1419;
      color: #e1e8ed;
      padding: 20px;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    h1 small { font-size: 14px; color: #8899a6; font-weight: normal; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
      gap: 16px;
      margin-bottom: 16px;
    }
    .card {
      background: #1a2332;
      border-radius: 12px;
      padding: 18px;
      border: 1px solid #2a3a4e;
    }
    .card h2 {
      font-size: 14px;
      color: #8899a6;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #2a3a4e;
    }
    .card pre {
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-all;
      color: #b3c4d4;
    }
    .big-temp {
      font-size: 48px;
      font-weight: bold;
      text-align: center;
      padding: 10px 0;
    }
    .big-temp .unit { font-size: 24px; color: #8899a6; }
    .big-temp.normal { color: #4caf50; }
    .big-temp.warm { color: #ff9800; }
    .big-temp.hot { color: #f44336; }
    .stat-row {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      border-bottom: 1px solid #1e2d40;
    }
    .stat-row .label { color: #8899a6; }
    .stat-row .value { color: #e1e8ed; font-family: monospace; }
    .throttle-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: bold;
    }
    .badge-ok { background: #1b5e20; color: #a5d6a7; }
    .badge-warn { background: #e65100; color: #ffcc80; }
    .badge-err { background: #b71c1c; color: #ef9a9a; }
    .last-updated {
      text-align: right;
      color: #556677;
      font-size: 12px;
      margin-top: 12px;
    }
    @media (max-width: 600px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<h1>Pi Monitor <small>Raspberry Pi System Dashboard</small></h1>

<div class="grid">
  <div class="card">
    <h2>CPU 온도</h2>
    <div id="cpu-temp" class="big-temp normal">--<span class="unit">&deg;C</span></div>
    <div id="cpu-clock" class="stat-row"><span class="label">클럭</span><span class="value">--</span></div>
    <div id="cpu-load" class="stat-row"><span class="label">Load Avg</span><span class="value">--</span></div>
  </div>

  <div class="card">
    <h2>전압 &amp; 스로틀링</h2>
    <div id="volt-core" class="stat-row"><span class="label">Core 전압</span><span class="value">--</span></div>
    <div id="volt-sdram" class="stat-row"><span class="label">SDRAM 전압</span><span class="value">--</span></div>
    <div id="throttle-status" class="stat-row"><span class="label">스로틀링</span><span class="value">--</span></div>
    <div id="throttle-detail" style="margin-top:8px;font-size:12px;color:#8899a6;"></div>
  </div>

  <div class="card">
    <h2>시스템 정보</h2>
    <div id="sys-model" class="stat-row"><span class="label">모델</span><span class="value">--</span></div>
    <div id="sys-kernel" class="stat-row"><span class="label">커널</span><span class="value">--</span></div>
    <div id="sys-os" class="stat-row"><span class="label">OS</span><span class="value">--</span></div>
    <div id="sys-revision" class="stat-row"><span class="label">Revision</span><span class="value">--</span></div>
    <div id="sys-serial" class="stat-row"><span class="label">시리얼</span><span class="value">--</span></div>
    <div id="sys-firmware" class="stat-row"><span class="label">펌웨어</span><span class="value">--</span></div>
  </div>

  <div class="card">
    <h2>메모리</h2>
    <pre id="mem-free">--</pre>
    <div id="mem-gpu" class="stat-row"><span class="label">GPU 메모리</span><span class="value">--</span></div>
    <div id="mem-arm" class="stat-row"><span class="label">ARM 메모리</span><span class="value">--</span></div>
  </div>
</div>

<div class="grid">
  <div class="card">
    <h2>디스크 사용량</h2>
    <pre id="disk-df">--</pre>
  </div>
  <div class="card">
    <h2>Inode 사용량</h2>
    <pre id="disk-inode">--</pre>
  </div>
</div>

<div class="last-updated" id="last-updated">Waiting for data...</div>

<script>
function parseThrottled(hex) {
  if (!hex || hex === '0x0') return { status: 'ok', msg: '정상', bits: [] };
  const m = hex.match(/0x([0-9a-fA-F]+)/);
  if (!m) return { status: 'ok', msg: '알 수 없음', bits: [] };
  const val = parseInt(m[1], 16);
  const bits = [];
  if (val & 0x1) bits.push('언더볼트 발생 중');
  if (val & 0x2) bits.push('주파수 상한 설정됨');
  if (val & 0x4) bits.push('현재 스로틀링 중');
  if (val & 0x8) bits.push('소프트 온도 한계 도달');
  if (val & 0x10000) bits.push('언더볼트 발생 이력');
  if (val & 0x20000) bits.push('주파수 상한 이력');
  if (val & 0x40000) bits.push('스로틀링 이력');
  if (val & 0x80000) bits.push('소프트 온도 한계 도달 이력');
  const severity = (val & 0xF) ? 'warn' : 'ok';
  return { status: severity, msg: bits.length > 0 ? bits.join(', ') : '이상 감지', bits };
}

function setText(id, text) {
  const el = document.getElementById(id);
  if (el) el.textContent = text || 'N/A';
}

function setHTML(id, html) {
  const el = document.getElementById(id);
  if (el) el.innerHTML = html;
}

async function fetchAll() {
  try {
    const [sys, cpu, mem, volt, disk] = await Promise.all([
      fetch('/api/system').then(r => r.json()),
      fetch('/api/cpu').then(r => r.json()),
      fetch('/api/memory').then(r => r.json()),
      fetch('/api/voltage').then(r => r.json()),
      fetch('/api/disk').then(r => r.json()),
    ]);

    // System
    const osName = sys.osRelease ? (sys.osRelease.match(/PRETTY_NAME="([^"]+)"/) || [,''])[1] : '';
    setText('sys-model', sys.model.split('\n')[0] || 'N/A');
    setText('sys-kernel', sys.uname.split(' ')[2] || sys.uname.split('\n')[0] || 'N/A');
    setText('sys-os', osName || 'N/A');
    setText('sys-revision', sys.revision || 'N/A');
    setText('sys-serial', sys.serial || 'N/A');
    setText('sys-firmware', (sys.firmware || '').split('\n')[0] || 'N/A');

    // CPU
    const tempMatch = cpu.temp ? cpu.temp.match(/([\d.]+)/) : null;
    if (tempMatch) {
      const tempVal = parseFloat(tempMatch[1]);
      const el = document.getElementById('cpu-temp');
      el.innerHTML = tempVal.toFixed(1) + '<span class="unit">&deg;C</span>';
      el.className = 'big-temp ' + (tempVal < 60 ? 'normal' : tempVal < 75 ? 'warm' : 'hot');
    }
    const clockMatch = cpu.clock ? cpu.clock.match(/([\d.]+)/) : null;
    if (clockMatch) {
      const mhz = (parseFloat(clockMatch[1]) / 1000000).toFixed(1);
      setText('cpu-clock', mhz + ' MHz');
    } else if (cpu.scalingFreq) {
      const mhz = (parseInt(cpu.scalingFreq) / 1000).toFixed(1);
      setText('cpu-clock', mhz + ' MHz (scaling)');
    }
    setText('cpu-load', cpu.load || 'N/A');

    // Memory
    setText('mem-free', cpu.meminfo || cpu.free || 'N/A');
    if (cpu.meminfo && cpu.meminfo.includes('\n')) {
      setText('mem-free', cpu.free || cpu.meminfo.split('\n').slice(0,4).join('\n'));
    }
    setHTML('mem-free', (mem.free || 'N/A').replace(/\n/g, '<br>'));
    setText('mem-gpu', mem.gpuMem || 'N/A');
    setText('mem-arm', mem.armMem || 'N/A');

    // Voltage / Throttle
    setText('volt-core', volt.coreVolt || 'N/A');
    setText('volt-sdram', volt.sdramVolt || 'N/A');

    const thr = parseThrottled(volt.throttled);
    const badgeClass = thr.status === 'ok' ? 'badge-ok' : 'badge-warn';
    setHTML('throttle-status', '<span class="throttle-badge ' + badgeClass + '">' + thr.msg + '</span>');
    setText('throttle-detail', volt.throttled ? 'Raw: ' + volt.throttled : '');

    // Disk
    setHTML('disk-df', (disk.df || 'N/A').replace(/\n/g, '<br>'));
    setHTML('disk-inode', (disk.inode || 'N/A').replace(/\n/g, '<br>'));

    document.getElementById('last-updated').textContent = 'Last updated: ' + new Date().toLocaleTimeString();
  } catch (err) {
    console.error(err);
  }
}

fetchAll();
setInterval(fetchAll, 5000);
</script>

</body>
</html>
