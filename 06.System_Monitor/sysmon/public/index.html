<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍓 Pi Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0a0c10;
    --bg2:      #111318;
    --bg3:      #1a1d24;
    --border:   #2a2d36;
    --accent:   #c8ff00;
    --accent2:  #00e5ff;
    --accent3:  #ff4d6d;
    --accent4:  #ffa500;
    --text:     #e8eaf0;
    --muted:    #5a5f72;
    --success:  #39ff14;
    --warn:     #ffa500;
    --danger:   #ff4d6d;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── 배경 그리드 ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(200,255,0,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,255,0,.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── 헤더 ── */
  header {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,12,16,.92);
    backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: -0.5px;
    color: var(--accent);
  }

  .logo span { color: var(--text); font-weight: 400; }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--success);
    box-shadow: 0 0 8px var(--success);
    animation: pulse 2s infinite;
  }

  .status-dot.offline { background: var(--danger); box-shadow: 0 0 8px var(--danger); animation: none; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 24px;
    font-size: 11px;
    color: var(--muted);
  }

  .last-update { font-size: 11px; color: var(--muted); }

  /* ── 메인 레이아웃 ── */
  main {
    position: relative;
    z-index: 1;
    padding: 28px 32px;
    max-width: 1600px;
    margin: 0 auto;
  }

  /* ── 섹션 타이틀 ── */
  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
    padding-left: 2px;
  }

  /* ── 카드 기본 ── */
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    position: relative;
    overflow: hidden;
    transition: border-color .2s;
  }

  .card:hover { border-color: #3a3f50; }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(200,255,0,.2), transparent);
  }

  /* ── OS Info 행 ── */
  .info-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 12px;
    margin-bottom: 28px;
  }

  .info-item {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .info-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  .info-value {
    font-size: 13px;
    color: var(--text);
    word-break: break-all;
  }

  .info-value.accent { color: var(--accent); }
  .info-value.accent2 { color: var(--accent2); }

  /* ── 메트릭 그리드 ── */
  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 20px;
    margin-bottom: 28px;
  }

  /* ── 게이지 카드 ── */
  .gauge-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 22px 24px;
    position: relative;
    overflow: hidden;
  }

  .gauge-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .gauge-title {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .gauge-value {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -1px;
    line-height: 1;
    margin-bottom: 6px;
  }

  .gauge-sub {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 14px;
  }

  /* ── 프로그레스 바 ── */
  .progress-wrap {
    background: var(--bg3);
    border-radius: 4px;
    height: 6px;
    overflow: hidden;
    margin-bottom: 8px;
  }

  .progress-bar {
    height: 100%;
    border-radius: 4px;
    transition: width .6s cubic-bezier(.4,0,.2,1);
    position: relative;
  }

  .progress-bar::after {
    content: '';
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 20px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,.3));
  }

  .bar-cpu    { background: linear-gradient(90deg, #c8ff00, #aadd00); }
  .bar-mem    { background: linear-gradient(90deg, #00e5ff, #0099cc); }
  .bar-temp   { background: linear-gradient(90deg, #ff9900, #ff4d6d); }
  .bar-disk   { background: linear-gradient(90deg, #a855f7, #7c3aed); }

  .progress-bar.warn  { background: linear-gradient(90deg, #ffa500, #ff6600) !important; }
  .progress-bar.danger { background: linear-gradient(90deg, #ff4d6d, #cc0022) !important; }

  /* ── 온도 아이콘 ── */
  .temp-status {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 700;
  }

  .temp-ok   { background: rgba(57,255,20,.1);  color: var(--success); border: 1px solid rgba(57,255,20,.3); }
  .temp-warn { background: rgba(255,165,0,.1);  color: var(--warn);    border: 1px solid rgba(255,165,0,.3); }
  .temp-hot  { background: rgba(255,77,109,.1); color: var(--danger);  border: 1px solid rgba(255,77,109,.3); }

  /* ── 스로틀링 카드 ── */
  .throttle-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 12px;
  }

  .throttle-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-radius: 8px;
    background: var(--bg3);
    font-size: 11px;
  }

  .throttle-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .dot-ok   { background: var(--success); box-shadow: 0 0 5px var(--success); }
  .dot-warn { background: var(--warn);    box-shadow: 0 0 5px var(--warn); }
  .dot-err  { background: var(--danger);  box-shadow: 0 0 5px var(--danger); }

  /* ── 전압 카드 ── */
  .volt-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }

  .volt-row:last-child { border-bottom: none; }

  .volt-name { font-size: 12px; color: var(--muted); }
  .volt-val  { font-size: 16px; font-weight: 700; color: var(--accent2); }
  .volt-bar-wrap { flex: 1; margin: 0 16px; }

  /* ── 디스크 테이블 ── */
  .disk-table { width: 100%; border-collapse: collapse; font-size: 12px; }

  .disk-table th {
    text-align: left;
    padding: 8px 12px;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    font-weight: 400;
  }

  .disk-table td {
    padding: 12px 12px;
    border-bottom: 1px solid rgba(42,45,54,.6);
    vertical-align: middle;
  }

  .disk-table tr:last-child td { border-bottom: none; }

  .disk-mount { color: var(--accent); font-weight: 500; }
  .disk-fs    { color: var(--muted); font-size: 11px; }

  /* ── 차트 영역 ── */
  .chart-section {
    margin-bottom: 28px;
  }

  .chart-wrap {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    position: relative;
    overflow: hidden;
  }

  canvas {
    display: block;
    width: 100% !important;
  }

  /* ── 로딩 ── */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 200px;
    color: var(--muted);
    font-size: 13px;
    gap: 12px;
  }

  .spinner {
    width: 18px; height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── 숫자 애니메이션 ── */
  .num-anim { transition: color .3s; }

  /* ── 반응형 ── */
  @media (max-width: 768px) {
    header { padding: 14px 16px; }
    main   { padding: 16px; }
    .metrics-grid { grid-template-columns: 1fr; }
    .throttle-grid { grid-template-columns: 1fr; }
  }

  /* ── 펌웨어/칩 정보 배너 ── */
  .fw-banner {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 20px;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .fw-banner strong { color: var(--text); }

</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="status-dot" id="statusDot"></div>
    <div class="logo">Pi<span>Monitor</span></div>
  </div>
  <div class="header-right">
    <span class="last-update">갱신: <span id="lastUpdate">--</span></span>
    <span id="headerTemp" style="color:var(--accent);font-size:13px;font-weight:700">-- °C</span>
    <span id="headerClock" style="color:var(--accent2);font-size:12px">-- MHz</span>
  </div>
</header>

<main>

  <!-- OS 정보 -->
  <div class="section-title">시스템 정보</div>
  <div class="info-grid" id="osGrid">
    <div class="loading"><div class="spinner"></div> 로딩 중...</div>
  </div>

  <!-- 펌웨어 -->
  <div class="fw-banner" id="fwBanner">
    <span>📦 Firmware:</span>
    <strong id="fwText">--</strong>
  </div>

  <!-- 실시간 메트릭 -->
  <div class="section-title">실시간 메트릭</div>
  <div class="metrics-grid">

    <!-- CPU -->
    <div class="gauge-card">
      <div class="gauge-header">
        <div class="gauge-title">CPU 사용률</div>
        <div id="cpuCores" style="font-size:11px;color:var(--muted)">-- cores</div>
      </div>
      <div class="gauge-value bar-cpu" style="-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;" id="cpuPct">--%</div>
      <div class="gauge-sub" id="cpuClock">-- MHz</div>
      <div class="progress-wrap">
        <div class="progress-bar bar-cpu" id="cpuBar" style="width:0%"></div>
      </div>
    </div>

    <!-- 메모리 -->
    <div class="gauge-card">
      <div class="gauge-header">
        <div class="gauge-title">메모리 사용률</div>
        <div id="memTotal" style="font-size:11px;color:var(--muted)">-- GB 총계</div>
      </div>
      <div class="gauge-value" style="color:var(--accent2)" id="memPct">--%</div>
      <div class="gauge-sub" id="memDetail">사용 -- / 전체 --</div>
      <div class="progress-wrap">
        <div class="progress-bar bar-mem" id="memBar" style="width:0%"></div>
      </div>
      <div style="display:flex;gap:16px;margin-top:10px;font-size:10px;color:var(--muted)">
        <span>GPU: <strong id="gpuMem" style="color:var(--text)">--</strong> MB</span>
        <span>ARM: <strong id="armMem" style="color:var(--text)">--</strong> MB</span>
      </div>
    </div>

    <!-- 온도 -->
    <div class="gauge-card">
      <div class="gauge-header">
        <div class="gauge-title">CPU 온도</div>
        <div class="temp-status temp-ok" id="tempBadge">정상</div>
      </div>
      <div class="gauge-value" id="tempVal" style="color:var(--accent4)">-- °C</div>
      <div class="gauge-sub">한계: 80°C 경고 / 85°C 스로틀링</div>
      <div class="progress-wrap">
        <div class="progress-bar bar-temp" id="tempBar" style="width:0%"></div>
      </div>
    </div>

    <!-- 스로틀링 -->
    <div class="gauge-card">
      <div class="gauge-header">
        <div class="gauge-title">스로틀링 상태</div>
        <div style="font-size:11px;color:var(--muted)" id="throttleHex">0x0</div>
      </div>
      <div class="throttle-grid" id="throttleGrid">
        <!-- JS로 채움 -->
      </div>
    </div>

  </div>

  <!-- 전압 -->
  <div class="section-title">전압 모니터링</div>
  <div class="card" style="margin-bottom:28px" id="voltCard">
    <div class="loading"><div class="spinner"></div> 로딩 중...</div>
  </div>

  <!-- 히스토리 차트 -->
  <div class="section-title">히스토리 (최근 60초)</div>
  <div class="chart-section">
    <div class="chart-wrap">
      <canvas id="historyChart" height="120"></canvas>
    </div>
  </div>

  <!-- 디스크 -->
  <div class="section-title">디스크 사용량</div>
  <div class="card" style="margin-bottom:28px">
    <div id="diskArea">
      <div class="loading"><div class="spinner"></div> 로딩 중...</div>
    </div>
  </div>

</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script>
// ── 히스토리 데이터 ───────────────────────────────────────────────────────────
const MAX_POINTS = 30;
const history = { labels: [], cpu: [], temp: [], mem: [] };

// ── Chart.js 초기화 ───────────────────────────────────────────────────────────
const ctx = document.getElementById('historyChart').getContext('2d');
const chart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: history.labels,
    datasets: [
      {
        label: 'CPU %',
        data: history.cpu,
        borderColor: '#c8ff00',
        backgroundColor: 'rgba(200,255,0,.06)',
        fill: true,
        tension: .4,
        pointRadius: 0,
        borderWidth: 2,
      },
      {
        label: '온도 °C',
        data: history.temp,
        borderColor: '#ffa500',
        backgroundColor: 'rgba(255,165,0,.06)',
        fill: true,
        tension: .4,
        pointRadius: 0,
        borderWidth: 2,
        yAxisID: 'y2',
      },
      {
        label: 'MEM %',
        data: history.mem,
        borderColor: '#00e5ff',
        backgroundColor: 'rgba(0,229,255,.06)',
        fill: true,
        tension: .4,
        pointRadius: 0,
        borderWidth: 2,
      },
    ],
  },
  options: {
    responsive: true,
    animation: { duration: 300 },
    interaction: { mode: 'index', intersect: false },
    plugins: {
      legend: {
        labels: {
          color: '#5a5f72',
          font: { family: "'JetBrains Mono'", size: 11 },
          boxWidth: 12,
        },
      },
      tooltip: {
        backgroundColor: '#1a1d24',
        borderColor: '#2a2d36',
        borderWidth: 1,
        titleColor: '#5a5f72',
        bodyColor: '#e8eaf0',
        bodyFont: { family: "'JetBrains Mono'" },
      },
    },
    scales: {
      x: {
        grid: { color: 'rgba(42,45,54,.5)' },
        ticks: { color: '#5a5f72', font: { family: "'JetBrains Mono'", size: 10 }, maxTicksLimit: 8 },
      },
      y: {
        min: 0, max: 100,
        grid: { color: 'rgba(42,45,54,.5)' },
        ticks: { color: '#5a5f72', font: { family: "'JetBrains Mono'", size: 10 }, callback: v => v + '%' },
      },
      y2: {
        position: 'right',
        min: 0, max: 100,
        grid: { display: false },
        ticks: { color: '#ffa500', font: { family: "'JetBrains Mono'", size: 10 }, callback: v => v + '°C' },
      },
    },
  },
});

// ── 유틸 ─────────────────────────────────────────────────────────────────────
const fmt = {
  bytes: (b) => {
    if (b >= 1e9) return (b / 1e9).toFixed(1) + ' GB';
    if (b >= 1e6) return (b / 1e6).toFixed(1) + ' MB';
    return (b / 1e3).toFixed(0) + ' KB';
  },
  time: (ts) => new Date(ts).toLocaleTimeString('ko-KR'),
};

function barClass(pct) {
  if (pct > 90) return 'danger';
  if (pct > 70) return 'warn';
  return '';
}

// ── OS 정보 렌더 (최초 1회) ───────────────────────────────────────────────────
function renderOS(data) {
  const { os, firmware } = data;
  document.getElementById('fwText').textContent = firmware || 'N/A';

  const items = [
    { label: 'OS',       value: os.osRelease,  cls: '' },
    { label: '커널',     value: os.kernel,      cls: 'accent2' },
    { label: '모델',     value: os.model,       cls: 'accent' },
    { label: 'Revision', value: os.revision,    cls: '' },
    { label: 'Serial',   value: os.serial,      cls: '' },
  ];

  document.getElementById('osGrid').innerHTML = items.map(i => `
    <div class="info-item">
      <div class="info-label">${i.label}</div>
      <div class="info-value ${i.cls}">${i.value || 'N/A'}</div>
    </div>
  `).join('');
}

// ── 전압 렌더 (최초 1회) ─────────────────────────────────────────────────────
function renderVoltage(v) {
  const rows = [
    { name: 'Core',   val: v.core,   normal: [1.1, 1.35] },
    { name: 'SDRAM_C', val: v.sdramC, normal: [1.1, 1.35] },
    { name: 'SDRAM_I', val: v.sdramI, normal: [1.1, 1.35] },
    { name: 'SDRAM_P', val: v.sdramP, normal: [1.1, 1.35] },
  ];

  const maxV = 1.5;

  document.getElementById('voltCard').innerHTML = rows.map(r => {
    const pct = Math.min(100, (r.val / maxV) * 100);
    const ok  = r.val >= r.normal[0] && r.val <= r.normal[1];
    const cls = ok ? 'bar-mem' : 'danger';
    return `
      <div class="volt-row">
        <div class="volt-name">${r.name}</div>
        <div class="volt-bar-wrap">
          <div class="progress-wrap" style="margin-bottom:0">
            <div class="progress-bar ${cls}" style="width:${pct}%"></div>
          </div>
        </div>
        <div class="volt-val">${r.val.toFixed(3)} V</div>
      </div>
    `;
  }).join('');
}

// ── 디스크 렌더 ───────────────────────────────────────────────────────────────
function renderDisk(disk) {
  if (!disk.disks || disk.disks.length === 0) {
    document.getElementById('diskArea').innerHTML = '<div style="color:var(--muted);font-size:12px;padding:8px">디스크 정보 없음</div>';
    return;
  }

  const rows = disk.disks.map(d => {
    const pct = d.usedPercent;
    const cls = pct > 90 ? 'danger' : pct > 70 ? 'warn' : 'bar-disk';
    return `
      <tr>
        <td>
          <div class="disk-mount">${d.mountpoint}</div>
          <div class="disk-fs">${d.filesystem}</div>
        </td>
        <td>${fmt.bytes(d.total)}</td>
        <td>${fmt.bytes(d.used)}</td>
        <td>${fmt.bytes(d.available)}</td>
        <td>
          <div style="display:flex;align-items:center;gap:8px">
            <div class="progress-wrap" style="flex:1;margin-bottom:0">
              <div class="progress-bar ${cls}" style="width:${pct}%"></div>
            </div>
            <span style="font-size:11px;color:${pct>90?'var(--danger)':pct>70?'var(--warn)':'var(--text)'};min-width:32px">${pct}%</span>
          </div>
        </td>
      </tr>
    `;
  }).join('');

  document.getElementById('diskArea').innerHTML = `
    <table class="disk-table">
      <thead>
        <tr>
          <th>마운트 포인트</th>
          <th>전체</th>
          <th>사용</th>
          <th>여유</th>
          <th>사용률</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

// ── 실시간 메트릭 업데이트 ────────────────────────────────────────────────────
function updateMetrics(cpu, memory) {
  // CPU
  const cpuPct = cpu.cpuUsage.toFixed(1);
  document.getElementById('cpuPct').textContent     = cpuPct + '%';
  document.getElementById('cpuClock').textContent   = `클럭: ${cpu.clockMHz} MHz`;
  document.getElementById('cpuCores').textContent   = `${cpu.cpuCount} cores`;
  const cpuBar = document.getElementById('cpuBar');
  cpuBar.style.width = cpuPct + '%';
  cpuBar.className = `progress-bar bar-cpu ${barClass(cpu.cpuUsage)}`;

  // 메모리
  const memPct = memory.usedPercent;
  document.getElementById('memPct').textContent    = memPct + '%';
  document.getElementById('memTotal').textContent  = fmt.bytes(memory.total) + ' 총계';
  document.getElementById('memDetail').textContent = `사용 ${fmt.bytes(memory.used)} / 전체 ${fmt.bytes(memory.total)}`;
  document.getElementById('gpuMem').textContent    = memory.gpuMB;
  document.getElementById('armMem').textContent    = memory.armMB;
  const memBar = document.getElementById('memBar');
  memBar.style.width = memPct + '%';
  memBar.className = `progress-bar bar-mem ${barClass(memPct)}`;

  // 온도
  const temp = cpu.tempC;
  document.getElementById('tempVal').textContent = temp + ' °C';
  const tempPct = Math.min(100, (temp / 85) * 100);
  const tempBar = document.getElementById('tempBar');
  tempBar.style.width = tempPct + '%';

  const badge = document.getElementById('tempBadge');
  if (temp >= 80)      { badge.className = 'temp-status temp-hot';  badge.textContent = '⚠ 과열'; }
  else if (temp >= 65) { badge.className = 'temp-status temp-warn'; badge.textContent = '주의'; }
  else                 { badge.className = 'temp-status temp-ok';   badge.textContent = '정상'; }

  // 헤더
  document.getElementById('headerTemp').textContent  = temp + ' °C';
  document.getElementById('headerClock').textContent = cpu.clockMHz + ' MHz';

  // 스로틀링
  document.getElementById('throttleHex').textContent = cpu.throttleHex;
  const f = cpu.throttleFlags;
  const flags = [
    { label: '언더볼트',   key: 'undervoltNow',  past: f.undervoltPast  },
    { label: '주파수 제한', key: 'freqCapNow',    past: f.freqCapPast    },
    { label: '스로틀링',   key: 'throttledNow',  past: f.throttledPast  },
    { label: '온도 제한',  key: 'tempLimitNow',  past: f.tempLimitPast  },
  ];
  document.getElementById('throttleGrid').innerHTML = flags.map(fl => {
    const now  = f[fl.key];
    const dotC = now ? 'dot-err' : fl.past ? 'dot-warn' : 'dot-ok';
    const lbl  = now ? `<span style="color:var(--danger)">${fl.label}</span>`
                     : fl.past ? `<span style="color:var(--warn)">${fl.label} (이력)</span>`
                     : `<span style="color:var(--muted)">${fl.label}</span>`;
    return `<div class="throttle-item"><div class="throttle-dot ${dotC}"></div>${lbl}</div>`;
  }).join('');
}

// ── 히스토리 추가 ─────────────────────────────────────────────────────────────
function pushHistory(cpu, memory) {
  const label = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  history.labels.push(label);
  history.cpu.push(parseFloat(cpu.cpuUsage.toFixed(1)));
  history.temp.push(cpu.tempC);
  history.mem.push(memory.usedPercent);
  if (history.labels.length > MAX_POINTS) {
    history.labels.shift(); history.cpu.shift(); history.temp.shift(); history.mem.shift();
  }
  chart.update('none');
}

// ── 초기 전체 데이터 로드 ─────────────────────────────────────────────────────
let osLoaded = false;

async function loadAll() {
  try {
    const res  = await fetch('/api/all');
    const data = await res.json();
    if (!osLoaded) {
      renderOS(data);
      renderVoltage(data.voltage);
      osLoaded = true;
    }
    updateMetrics(data.cpu, data.memory);
    pushHistory(data.cpu, data.memory);
    document.getElementById('lastUpdate').textContent = fmt.time(data.timestamp);
    document.getElementById('statusDot').className = 'status-dot';
  } catch (e) {
    document.getElementById('statusDot').className = 'status-dot offline';
  }
}

async function loadDisk() {
  try {
    const res  = await fetch('/api/disk');
    const data = await res.json();
    renderDisk(data);
  } catch {}
}

// ── SSE 실시간 스트림 ─────────────────────────────────────────────────────────
function connectSSE() {
  const es = new EventSource('/api/stream');
  es.onmessage = (e) => {
    try {
      const d = JSON.parse(e.data);
      if (d.cpu && d.memory) {
        updateMetrics(d.cpu, d.memory);
        pushHistory(d.cpu, d.memory);
        document.getElementById('lastUpdate').textContent = fmt.time(d.timestamp);
        document.getElementById('statusDot').className = 'status-dot';
      }
    } catch {}
  };
  es.onerror = () => {
    document.getElementById('statusDot').className = 'status-dot offline';
    es.close();
    setTimeout(connectSSE, 5000);  // 재연결
  };
}

// ── 시작 ─────────────────────────────────────────────────────────────────────
loadAll();
loadDisk();
connectSSE();

// 전압/디스크는 10초마다 갱신
setInterval(async () => {
  try {
    const res = await fetch('/api/all');
    const d   = await res.json();
    renderVoltage(d.voltage);
  } catch {}
}, 10000);

setInterval(loadDisk, 15000);
</script>
